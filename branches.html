<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Branch - StudyNest</title>

<style>
:root{
    --bg-light: linear-gradient(135deg,#eef2ff,#f8fafc);
    --bg-dark: linear-gradient(135deg,#0f172a,#1e293b);
    --text-light:#1E293B;
    --text-dark:#f1f5f9;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg-light);
    color:var(--text-light);
    overflow-x:hidden;
    transition:0.4s;
}

/* Dark Mode */
body.dark{
    background:var(--bg-dark);
    color:var(--text-dark);
}

/* Toggle Button */
.toggle{
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#2563EB;
    color:white;
}

/* Title */
h1{
    text-align:center;
    margin-top:80px;
}

/* Container */
.branch-container{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:60px;
    flex-wrap:wrap;
}

/* Glass Card */
.branch-card{
    width:260px;
    height:220px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 15px 30px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:transform 0.2s ease;
    perspective:1000px;
}

body.dark .branch-card{
    background: rgba(255,255,255,0.05);
}

/* SVG Icon */
.branch-card svg{
    width:50px;
    height:50px;
    margin-bottom:15px;
    fill:#2563EB;
}

/* Hover */
.branch-card:hover{
    box-shadow:0 25px 40px rgba(37,99,235,0.3);
}

/* Responsive */
@media(max-width:768px){
    .branch-container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleDark()">Toggle Dark Mode</button>

<h1>Select Your Branch</h1>

<div class="branch-container">

    <div class="branch-card" onclick="openBranch('cse.html')">
        <!-- SVG ICON -->
        <svg viewBox="0 0 24 24">
    <path d="M4 5h16v10H4z" fill="none" stroke="#2563EB" stroke-width="2"/>
    <path d="M8 19h8" stroke="#2563EB" stroke-width="2"/>
    <path d="M9 9l-2 2 2 2M15 9l2 2-2 2" 
          fill="none" stroke="#2563EB" stroke-width="2"/>
</svg>

        <h3>CSE</h3>
        <p>Computer Science Engineering</p>
    </div>

    
    <div class="branch-card" onclick="openBranch('me.html')">
        <svg viewBox="0 0 24 24">
    <path d="M12 8a4 4 0 100 8 4 4 0 000-8z" 
          fill="none" stroke="#2563EB" stroke-width="2"/>
    <path d="M4 12h2M18 12h2M12 4v2M12 18v2
             M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4
             M6.3 17.7l1.4-1.4M16.3 7.7l1.4-1.4"
          stroke="#2563EB" stroke-width="2"/>
</svg>

        <h3>ME</h3>
        <p>Mechanical Engineering</p>
    </div>
    <div class="branch-card" onclick="openBranch('civil.html')">
        <svg viewBox="0 0 24 24">
    <path d="M4 22V6l8-4 8 4v16" 
          fill="none" stroke="#2563EB" stroke-width="2"/>
    <path d="M9 22V12h6v10" 
          fill="none" stroke="#2563EB" stroke-width="2"/>
</svg>

        <h3>Civil</h3>
        <p>Civil Engineering</p>
    </div>
     <div class="branch-card" onclick="openBranch('electrical.html')">
       <svg viewBox="0 0 24 24">
    <path d="M13 2L3 14h7l-1 8 10-12h-7z"
          fill="none" stroke="#2563EB" stroke-width="2"/>
</svg>

        <h3>ECE</h3>
        <p>Electronics Engineering</p>
    </div>

</div>

<script>

/* Open Branch */
function openBranch(page){
    window.location.href = page;
}

/* Dark Mode */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* 3D Tilt Effect */
document.querySelectorAll(".branch-card").forEach(card=>{
    card.addEventListener("mousemove", (e)=>{
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width/2;
        const centerY = rect.height/2;
        const rotateX = -(y - centerY)/15;
        const rotateY = (x - centerX)/15;
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener("mouseleave", ()=>{
        card.style.transform = "rotateX(0) rotateY(0)";
    });
});

/* Mouse Parallax Background */
document.addEventListener("mousemove",(e)=>{
    const moveX = (e.clientX/window.innerWidth)*20;
    const moveY = (e.clientY/window.innerHeight)*20;
    document.body.style.backgroundPosition = `${moveX}px ${moveY}px`;
});

</script>

</body>
</html>
