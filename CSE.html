<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE - StudyNest</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #F1F5F9;
    padding: 20px;
    border-right: 1px solid #ddd;
}

.sidebar h3 {
    margin-bottom: 15px;
}

.sidebar button {
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
    border: none;
    background: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.sidebar button:hover {
    background: #2563EB;
    color: white;
}

/* Subjects Panel */
.subjects {
    width: 250px;
    padding: 20px;
    border-right: 1px solid #ddd;
    transition: 0.3s;
}

.subjects h3 {
    margin-bottom: 15px;
}

.subjects button {
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: none;
    background: #F8FAFC;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.subjects button:hover {
    background: #2563EB;
    color: white;
}

/* Notes */
.notes {
    flex: 1;
    padding: 30px;
}

.note-box {
    background: #F8FAFC;
    padding: 20px;
    border-left: 5px solid #2563EB;
    border-radius: 6px;
    min-height: 200px;
}

/* Active Highlight */
.active-btn {
    background: #2563EB !important;
    color: white !important;
}

/* Animation */
.fade-in {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Collapse */
.collapsed {
    display: none;
}

/* Toggle Button */
#toggleBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 8px 15px;
    background: #2563EB;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 900px) {
    body {
        flex-direction: column;
    }

    .sidebar,
    .subjects {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ddd;
    }
}
</style>
</head>

<body>

<!-- Semester Sidebar -->
<div class="sidebar">
    <h3>Semesters</h3>
    <button onclick="loadSemester(1, this)">Semester 1</button>
    <button onclick="loadSemester(2, this)">Semester 2</button>
    <button onclick="loadSemester(3, this)">Semester 3</button>
    <button onclick="loadSemester(4, this)">Semester 4</button>
    <button onclick="loadSemester(5, this)">Semester 5</button>
    <button onclick="loadSemester(6, this)">Semester 6</button>
</div>

<!-- Subjects Panel -->
<div class="subjects" id="subjectPanel">
    <h3 id="semesterTitle">Select Semester</h3>
    <div id="subjectList">
        Choose a semester to view subjects.
    </div>
</div>

<!-- Notes Panel -->
<div class="notes">
    <h2 id="subjectTitle">Select Subject</h2>
    <div class="note-box" id="notesContent">
        Notes will appear here.
    </div>
</div>

<!-- Toggle Button (Always Visible) -->
<button id="toggleBtn" onclick="toggleSubjects()">Collapse Panel</button>

<script>

function loadSemester(sem, btn) {

    const subjectList = document.getElementById("subjectList");
    const semesterTitle = document.getElementById("semesterTitle");

    // Highlight active semester
    document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active-btn"));
    btn.classList.add("active-btn");

    semesterTitle.innerText = "Semester " + sem + " Subjects";
    subjectList.classList.add("fade-in");

    if (sem === 1) {
        subjectList.innerHTML = `
            <button onclick="loadSubject('english', this)">English</button>
            <button onclick="loadSubject('physics', this)">Physics</button>
            <button onclick="loadSubject('math', this)">Mathematics</button>
            <button onclick="loadSubject('foit', this)">FOIT</button>
        `;
    }

else if (sem === 2) {
    subjectList.innerHTML = `
        <button onclick="loadSubject('ait', this)">Advances in IT</button>
        <button onclick="loadSubject('math2', this)">Applied Mathematics-II</button>
        <button onclick="loadSubject('physics2', this)">Applied Physics - II</button>
        <button onclick="loadSubject('analog', this)">Analog Electronics</button>
        <button onclick="loadSubject('graphics', this)">Engineering Graphics</button>
        <button onclick="loadSubject('multimedia', this)">Multimedia Applications</button>
        <button onclick="loadSubject('evs', this)">Environmental Studies & Disaster Management</button>
    `;
}


if (sem === 3) {
    subjectList.innerHTML = `
        <button onclick="loadSubject('os', this)">Operating Systems</button>
        <button onclick="loadSubject('de', this)">Digital Electronics</button>
        <button onclick="loadSubject('cprog', this)">Programming in C</button>
        <button onclick="loadSubject('dbms', this)">Data Base Management System</button>
    `;
}


   if (sem === 4) {
    subjectList.innerHTML = `
        <button onclick="loadSubject('eng2', this)">English and Communication Skills - II</button>
        <button onclick="loadSubject('coa', this)">Computer Organization & Architecture</button>
        <button onclick="loadSubject('ds_c', this)">Data Structures using C</button>
        <button onclick="loadSubject('java', this)">Object Oriented Programming using Java</button>
    `;
}

 if (sem === 5) {
    subjectList.innerHTML = `
        <button onclick="loadSubject('web', this)">Web Technologies</button>
        <button onclick="loadSubject('python', this)">Python Programming</button>
        <button onclick="loadSubject('cn', this)">Computer Networks</button>
        <button onclick="loadSubject('elective1', this)">Programme Elective - I</button>
    `;
}


if (sem === 6) {
    subjectList.innerHTML = `
        <button onclick="loadSubject('webapp', this)">Application Development using Web Framework</button>
        <button onclick="loadSubject('edm', this)">Entrepreneurship Development & Management</button>
        <button onclick="loadSubject('se', this)">Software Engineering</button>
        <button onclick="loadSubject('elective2', this)">Programme Elective - II</button>
    `;
}

}

function loadSubject(subject, btn) {

    const subjectTitle = document.getElementById("subjectTitle");
    const notesContent = document.getElementById("notesContent");

    // Highlight active subject
    document.querySelectorAll(".subjects button").forEach(b => b.classList.remove("active-btn"));
    btn.classList.add("active-btn");

    notesContent.classList.add("fade-in");

    if(subject === "english"){
        subjectTitle.innerText = "English";
        notesContent.innerHTML = `
       <p><b>READING</b></p>

<p><b>What is Reading?</b></p>
<p>Reading means understanding written words. It helps us learn new things, improve vocabulary, and improve speaking and writing.</p>

<p><b>Techniques of Reading</b></p>

<p><b>1) Skimming</b></p>
<p>Skimming means reading quickly to get the main idea. We do not read every word. We only understand what the text is about. Example: Reading newspaper headlines.</p>

<p><b>2) Scanning</b></p>
<p>Scanning means reading quickly to find specific information. We search for names, dates, or numbers and ignore other details. Example: Finding a date in a book.</p>

<p><b>Extensive and Intensive Reading</b></p>

<p><b>1) Extensive Reading</b></p>
<p>Extensive reading means reading for enjoyment and general understanding. We read long stories or novels and do not need to understand every word. Example: Story books and newspapers.</p>

<p><b>2) Intensive Reading</b></p>
<p>Intensive reading means reading carefully to understand details. Usually short texts are read carefully to understand each word and meaning. Example: Textbook lessons.</p>

<p><b>Homecoming – Rabindranath Tagore</b></p>
<p><b>About the Author:</b> Rabindranath Tagore was a great Indian writer and poet.</p>
<p><b>Main Character:</b> Phatik, a village boy.</p>
<p><b>Story in Simple Words:</b> Phatik was a naughty boy. He was sent to Kolkata for studies. He missed his mother and village. He felt lonely and sad. He became sick. Before dying, he said he was going home.</p>
<p><b>Main Idea:</b> Love of mother, homesickness, and sadness of a child.</p>

<p><b>Life Sketch of Sir M. Visvesvaraya</b></p>
<p><b>Introduction:</b> Born on 15 September 1861. He was a great engineer of India.</p>
<p><b>Important Works:</b> Built Krishna Raja Sagar Dam and worked as Diwan of Mysore.</p>
<p><b>Awards:</b> Bharat Ratna in 1955.</p>
<p><b>Importance:</b> Engineers’ Day (15 September) is celebrated in his honor. He was honest and disciplined.</p>

<p><b>Life Sketch of Dr. A. P. J. Abdul Kalam</b></p>
<p><b>Introduction:</b> Born on 15 October 1931. Known as the Missile Man of India. He was the 11th President of India.</p>
<p><b>Achievements:</b> Worked in ISRO and DRDO. Helped in making missiles. Received Bharat Ratna award.</p>
<p><b>Good Qualities:</b> Simple person, hardworking, and loved students.</p>
<p><b>Message:</b> Dream big and work hard.</p>

<p><b>Narayan Murthy’s Speech at LBSNA, Dehradun</b></p>
<p><b>About Him:</b> N. R. Narayana Murthy is the founder of Infosys.</p>
<p><b>Main Points:</b> Be honest, work hard, serve the nation, and follow discipline.</p>
<p><b>Message:</b> Success comes with honesty and hard work.</p>
<p><b>FUNDAMENTALS OF COMMUNICATION</b></p>
<p>Communication means sharing ideas, information, and feelings between two or more people. It helps in understanding, building relationships, and working together effectively.</p>

<p><b>CONCEPT AND PROCESS OF COMMUNICATION</b></p>
<p><b>Concept:</b> Communication is the exchange of information between a sender and a receiver to create understanding.</p>
<p><b>Process:</b> The communication process includes Sender, Message, Encoding, Channel, Receiver, Decoding, and Feedback. Feedback shows whether the message is understood correctly.</p>

<p><b>TYPES OF COMMUNICATION (VERBAL COMMUNICATION)</b></p>
<p><b>Verbal Communication:</b> Communication through words.</p>
<p>1) Oral Communication – Spoken words like conversation, speech, phone calls.</p>
<p>2) Written Communication – Written words like letters, emails, messages.</p>

<p><b>BARRIERS TO COMMUNICATION</b></p>
<p>Barriers are problems that stop effective communication.</p>
<p>1) Physical Barriers – Noise, distance.</p>
<p>2) Language Barriers – Different languages or difficult words.</p>
<p>3) Psychological Barriers – Fear, stress, anger.</p>
<p>4) Cultural Barriers – Differences in culture and beliefs.</p>

<p><b>SPEAKING SKILL: SIGNIFICANCE AND ESSENTIALS</b></p>
<p><b>Significance:</b> Speaking skill helps in expressing ideas clearly and confidently.</p>
<p><b>Essentials:</b> Clear pronunciation, correct grammar, confidence, good vocabulary, and proper body language.</p>

<p><b>LISTENING SKILL: SIGNIFICANCE AND ESSENTIALS</b></p>
<p><b>Significance:</b> Listening helps in understanding the message properly and improves relationships.</p>
<p><b>Essentials:</b> Pay attention, avoid distractions, do not interrupt, and give proper feedback.</p>
<p><b>GRAMMAR AND USAGE</b></p>
<p>Grammar means the rules of a language. It helps us speak and write correctly.</p>

<p><b>NOUNS</b></p>
<p>A noun is the name of a person, place, animal, or thing.</p>
<p><b>Examples:</b> Rahul, school, dog, book.</p>
<p><b>Types of Nouns:</b></p>
<p>1) Proper Noun – Name of a person or place (India, Riya).</p>
<p>2) Common Noun – General name (city, girl).</p>
<p>3) Collective Noun – Name of a group (team, family).</p>
<p>4) Abstract Noun – Name of a feeling or quality (honesty, love).</p>

<p><b>PRONOUNS</b></p>
<p>A pronoun is a word used instead of a noun.</p>
<p><b>Examples:</b> He, She, It, They, We.</p>
<p><b>Example Sentence:</b> Riya is a girl. She is kind.</p>

<p><b>ARTICLES</b></p>
<p>Articles are small words used before nouns.</p>
<p>There are three articles: A, An, The.</p>
<p>1) A – Used before consonant sound (a book).</p>
<p>2) An – Used before vowel sound (an apple).</p>
<p>3) The – Used for specific person or thing (the sun).</p>

<p><b>VERBS (MAIN AND AUXILIARY)</b></p>
<p>A verb is an action word.</p>
<p><b>Main Verb:</b> Shows the main action (eat, run, write).</p>
<p><b>Auxiliary Verb:</b> Helping verb (is, am, are, was, were, has, have, had, will).</p>
<p><b>Example:</b> She is playing. (is = auxiliary, playing = main verb)</p>

<p><b>TENSES</b></p>
<p>Tense shows the time of action.</p>
<p>1) Present Tense – Action happening now (She plays).</p>
<p>2) Past Tense – Action happened before (She played).</p>
<p>3) Future Tense – Action will happen later (She will play).</p>
<p><b>WRITING SKILLS</b></p>
<p>Writing skill means the ability to express ideas clearly in written form. Good writing helps in studies, jobs, and daily communication.</p>

<p><b>Significance of Written Communication:</b></p>
<p>Written communication is important because it keeps a record, gives clear information, and avoids misunderstanding.</p>

<p><b>Essentials of Effective Written Communication:</b></p>
<p>1) Use simple and clear language.</p>
<p>2) Write correct grammar and spelling.</p>
<p>3) Be brief and to the point.</p>
<p>4) Organize ideas properly.</p>

<p><b>NOTICE WRITING</b></p>
<p>A notice is a short and clear information given to a group of people.</p>
<p><b>Features of Notice:</b></p>
<p>1) Name of the organization.</p>
<p>2) Date.</p>
<p>3) Title (Notice).</p>
<p>4) Clear message with details (what, when, where).</p>
<p>5) Signature and name.</p>

<p><b>OFFICIAL LETTERS AND E-MAILS</b></p>
<p>Official letters and emails are used for formal communication in offices and institutions.</p>
<p><b>Parts of an Official Letter:</b></p>
<p>1) Sender’s address.</p>
<p>2) Date.</p>
<p>3) Receiver’s address.</p>
<p>4) Subject.</p>
<p>5) Salutation (Sir/Madam).</p>
<p>6) Body of the letter.</p>
<p>7) Closing (Yours sincerely).</p>
<p>8) Signature.</p>

<p><b>Frequently-used Abbreviations in Letter Writing:</b></p>
<p>1) ASAP – As Soon As Possible.</p>
<p>2) FYI – For Your Information.</p>
<p>3) etc. – And so on.</p>
<p>4) i.e. – That is.</p>
<p>5) e.g. – For example.</p>

<p><b>PARAGRAPH WRITING</b></p>
<p>A paragraph is a group of sentences about one main idea.</p>
<p><b>Steps to Write a Good Paragraph:</b></p>
<p>1) Start with a topic sentence.</p>
<p>2) Add supporting sentences.</p>
<p>3) End with a concluding sentence.</p>

<p><b>NETIQUETTES</b></p>
<p>Netiquettes are rules for polite behavior on the internet.</p>
<p>1) Use respectful language.</p>
<p>2) Do not use all capital letters.</p>
<p>3) Check spelling before sending emails.</p>
<p>4) Do not share personal information.</p>
<p>5) Reply politely and clearly.</p>


        `;
    }

    if(subject === "physics"){
        subjectTitle.innerText = "Physics ";
        notesContent.innerHTML = `
            <p><b>UNIT AND DIMENSIONS</b></p>

<p><b>Definition of Physics:</b></p>
<p>Physics is the branch of science that studies matter, energy, and their interaction.</p>

<p><b>Physical Quantities:</b></p>
<p>A physical quantity is a quantity that can be measured.</p>

<p><b>Fundamental Quantities:</b></p>
<p>Basic quantities that do not depend on other quantities.</p>
<p>Examples: Length, Mass, Time.</p>

<p><b>Derived Quantities:</b></p>
<p>Quantities formed from fundamental quantities.</p>
<p>Examples: Velocity, Force, Work, Energy.</p>

<p><b>Units:</b></p>
<p>A unit is a standard used to measure a physical quantity.</p>

<p><b>Fundamental Units:</b></p>
<p>Units of fundamental quantities.</p>
<p>Examples: Meter (m), Kilogram (kg), Second (s).</p>

<p><b>Derived Units:</b></p>
<p>Units formed from fundamental units.</p>
<p>Examples: m/s (velocity), Newton (N), Joule (J).</p>

<p><b>System of Units:</b></p>
<p>1) CGS – Centimeter, Gram, Second.</p>
<p>2) FPS – Foot, Pound, Second.</p>
<p>3) MKS – Meter, Kilogram, Second.</p>
<p>4) SI – International System of Units (used worldwide).</p>

<p><b>Dimension:</b></p>
<p>Dimension shows how a physical quantity depends on fundamental quantities like length (L), mass (M), and time (T).</p>

<p><b>Dimensional Formulae and SI Units:</b></p>
<p>Distance – [L], Unit: meter (m).</p>
<p>Displacement – [L], Unit: meter (m).</p>
<p>Area – [L²], Unit: m².</p>
<p>Volume – [L³], Unit: m³.</p>
<p>Density – [M L⁻³], Unit: kg/m³.</p>
<p>Velocity – [L T⁻¹], Unit: m/s.</p>
<p>Acceleration – [L T⁻²], Unit: m/s².</p>
<p>Linear Momentum – [M L T⁻¹], Unit: kg·m/s.</p>
<p>Force – [M L T⁻²], Unit: Newton (N).</p>
<p>Impulse – [M L T⁻¹], Unit: N·s.</p>
<p>Work – [M L² T⁻²], Unit: Joule (J).</p>
<p>Power – [M L² T⁻³], Unit: Watt (W).</p>
<p>Energy – [M L² T⁻²], Unit: Joule (J).</p>
<p>Pressure – [M L⁻¹ T⁻²], Unit: Pascal (Pa).</p>
<p>Surface Tension – [M T⁻²], Unit: N/m.</p>
<p>Stress – [M L⁻¹ T⁻²], Unit: Pascal (Pa).</p>
<p>Strain – [1], Unit: No unit (dimensionless).</p>

<p><b>Dimensional Equation:</b></p>
<p>An equation written in terms of dimensions is called a dimensional equation.</p>

<p><b>Principle of Homogeneity:</b></p>
<p>In a correct physical equation, the dimensions on both sides must be the same.</p>

<p><b>Applications of Dimensional Analysis:</b></p>
<p>1) To check the correctness of a physical equation.</p>
<p>2) To convert one system of units into another.</p>
<p>Examples: Conversion of units of Force, Work, and Acceleration.</p>
<p><b>FORCE AND MOTION</b></p>

<p><b>Scalar and Vector Quantities:</b></p>
<p><b>Scalar Quantity:</b> A quantity which has only magnitude (size).</p>
<p>Examples: Mass, Time, Temperature, Distance.</p>
<p><b>Vector Quantity:</b> A quantity which has both magnitude and direction.</p>
<p>Examples: Displacement, Velocity, Acceleration, Force.</p>

<p><b>Representation of a Vector:</b></p>
<p>A vector is represented by an arrow. The length shows magnitude and the arrow shows direction.</p>

<p><b>Types of Vectors:</b></p>
<p>1) <b>Unit Vector:</b> A vector with magnitude 1.</p>
<p>2) <b>Position Vector:</b> A vector that shows the position of a point from origin.</p>
<p>3) <b>Co-initial Vectors:</b> Vectors having the same starting point.</p>
<p>4) <b>Collinear Vectors:</b> Vectors lying on the same straight line.</p>
<p>5) <b>Co-planar Vectors:</b> Vectors lying in the same plane.</p>

<p><b>Vector Algebra:</b></p>

<p><b>Addition of Vectors:</b> Vectors are added by triangle law or parallelogram law.</p>

<p><b>Triangle Law (Statement):</b> If two vectors are represented by two sides of a triangle taken in order, then the third side represents their resultant.</p>
<p><b>Formula:</b> R = √(A² + B² + 2AB cosθ)</p>

<p><b>Parallelogram Law (Statement):</b> If two vectors are represented by two adjacent sides of a parallelogram, then the diagonal represents their resultant.</p>
<p><b>Formula:</b> R = √(A² + B² + 2AB cosθ)</p>

<p><b>Scalar Product (Dot Product):</b></p>
<p><b>Statement:</b> The scalar product of two vectors is equal to the product of their magnitudes and the cosine of the angle between them.</p>
<p><b>Formula:</b> A · B = AB cosθ</p>

<p><b>Vector Product (Cross Product):</b></p>
<p><b>Statement:</b> The vector product of two vectors is equal to the product of their magnitudes and the sine of the angle between them.</p>
<p><b>Formula:</b> A × B = AB sinθ</p>

<p><b>Force and Its Units:</b></p>
<p>Force is a push or pull that can change the state of motion of a body.</p>
<p>SI Unit of force is Newton (N).</p>
<p>1 Newton = 1 kg m/s².</p>

<p><b>Resolution of Force:</b></p>
<p><b>Statement:</b> A single force can be resolved into two or more components.</p>
<p><b>Formula:</b> Fx = F cosθ, Fy = F sinθ</p>

<p><b>Newton’s Laws of Motion:</b></p>

<p><b>First Law:</b> A body remains at rest or in uniform motion unless acted upon by an external force.</p>
<p><b>Example:</b> A book remains on the table until pushed.</p>

<p><b>Second Law:</b> Force is equal to the rate of change of momentum.</p>
<p><b>Formula:</b> F = ma</p>
<p><b>Example:</b> A heavier object needs more force to move.</p>

<p><b>Third Law:</b> For every action, there is an equal and opposite reaction.</p>
<p><b>Example:</b> Recoil of a gun.</p>

<p><b>Linear Momentum:</b></p>
<p>Momentum is the product of mass and velocity.</p>
<p><b>Formula:</b> p = mv</p>

<p><b>Law of Conservation of Linear Momentum:</b></p>
<p><b>Statement:</b> Total momentum before collision equals total momentum after collision.</p>
<p><b>Example:</b> Collision of two balls.</p>

<p><b>Impulse:</b></p>
<p>Impulse is the product of force and time.</p>
<p><b>Formula:</b> Impulse = F × t</p>

<p><b>Circular Motion:</b></p>
<p><b>Angular Displacement:</b> Angle covered by a body moving in a circle.</p>
<p><b>Angular Velocity:</b> Rate of change of angular displacement.</p>
<p><b>Angular Acceleration:</b> Rate of change of angular velocity.</p>
<p><b>Frequency:</b> Number of rotations per second.</p>
<p><b>Time Period:</b> Time taken to complete one rotation.</p>

<p><b>Relation Between Linear and Angular Velocity:</b></p>
<p>v = rω</p>

<p><b>Centripetal Force:</b></p>
<p>Force acting towards the center in circular motion.</p>
<p><b>Formula:</b> F = mv²/r</p>

<p><b>Centrifugal Force:</b></p>
<p>Apparent outward force in circular motion.</p>

<p><b>Banking of Roads:</b></p>
<p>Roads are tilted at curves so that centripetal force helps vehicles turn safely.</p>
<p><b>ROTATIONAL MOTION</b></p>

<p><b>Definition:</b></p>
<p>Rotational motion is the motion of a body when it rotates or turns about a fixed axis.</p>

<p><b>Examples:</b></p>
<p>1) A ceiling fan rotating.</p>
<p>2) A wheel of a bicycle moving.</p>
<p>3) Earth rotating about its axis.</p>

<p><b>Torque:</b></p>
<p>Torque is the turning effect of a force.</p>
<p><b>Formula:</b> Torque = Force × Perpendicular distance from axis.</p>
<p><b>Symbol:</b> τ</p>
<p><b>SI Unit:</b> Newton-meter (N·m).</p>

<p><b>Angular Momentum:</b></p>
<p>Angular momentum is the rotational form of linear momentum.</p>
<p><b>Formula:</b> L = Iω</p>
<p>Where I = moment of inertia and ω = angular velocity.</p>
<p><b>SI Unit:</b> kg·m²/s.</p>

<p><b>Moment of Inertia:</b></p>
<p>Moment of inertia is the measure of resistance of a body to change its rotational motion.</p>
<p><b>Formula:</b> I = mr² (for a point mass).</p>
<p><b>SI Unit:</b> kg·m².</p>

<p><b>Physical Significance of Moment of Inertia:</b></p>
<p>1) It tells how difficult it is to rotate a body.</p>
<p>2) Larger moment of inertia means more force is needed to rotate.</p>
<p>3) Mass farther from the axis increases moment of inertia.</p>
<p><b>WORK, POWER AND ENERGY</b></p>

<p><b>WORK</b></p>
<p><b>Definition:</b> Work is said to be done when a force causes displacement in a body.</p>
<p><b>Symbol:</b> W</p>
<p><b>Formula:</b> W = F × s (Force × displacement)</p>
<p><b>SI Unit:</b> Joule (J)</p>

<p><b>Types of Work:</b></p>
<p>1) <b>Positive Work:</b> When force and displacement are in the same direction. Example: Pushing a box forward.</p>
<p>2) <b>Negative Work:</b> When force and displacement are in opposite directions. Example: Applying brakes on a bicycle.</p>
<p>3) <b>Zero Work:</b> When there is no displacement. Example: Pushing a wall that does not move.</p>

<p><b>FRICTION</b></p>
<p><b>Definition:</b> Friction is the force that opposes motion between two surfaces in contact.</p>
<p><b>Daily Life Applications:</b></p>
<p>1) Walking on the road.</p>
<p>2) Writing with a pen on paper.</p>
<p>3) Braking a vehicle.</p>

<p><b>POWER</b></p>
<p><b>Definition:</b> Power is the rate of doing work.</p>
<p><b>Formula:</b> Power = Work / Time (P = W/t)</p>
<p><b>SI Unit:</b> Watt (W)</p>

<p><b>ENERGY</b></p>
<p><b>Definition:</b> Energy is the ability to do work.</p>
<p><b>SI Unit:</b> Joule (J)</p>

<p><b>Examples of Transformation of Energy:</b></p>
<p>1) Electrical energy → Light energy (Electric bulb).</p>
<p>2) Chemical energy → Mechanical energy (Petrol engine).</p>
<p>3) Potential energy → Kinetic energy (Falling object).</p>

<p><b>KINETIC ENERGY</b></p>
<p><b>Definition:</b> Kinetic energy is the energy possessed by a body due to its motion.</p>
<p><b>Examples:</b> Moving car, running person.</p>
<p><b>Formula:</b> KE = ½mv²</p>

<p><b>Derivation of Kinetic Energy:</b></p>
<p>Work done = Force × distance</p>
<p>F = ma</p>
<p>Using equations of motion, v² = 2as</p>
<p>So, Work done = m a s = ½ m v²</p>
<p>Therefore, KE = ½mv²</p>

<p><b>POTENTIAL ENERGY</b></p>
<p><b>Definition:</b> Potential energy is the energy possessed by a body due to its position or height.</p>
<p><b>Examples:</b> Water stored in a dam, stretched rubber band.</p>
<p><b>Formula:</b> PE = mgh</p>

<p><b>Derivation of Potential Energy:</b></p>
<p>Work done against gravity = Force × height</p>
<p>Force = mg</p>
<p>So, Work done = mgh</p>
<p>Therefore, PE = mgh</p>
<p><b>LAW OF CONSERVATION OF MECHANICAL ENERGY (FOR FREELY FALLING BODY)</b></p>

<p><b>Statement:</b></p>
<p>When a body falls freely under gravity (no air resistance), the total mechanical energy 
(Kinetic Energy + Potential Energy) remains constant.</p>

<p><b>Derivation:</b></p>
<p>Let a body of mass m be at height h.</p>

<p>At the top:</p>
<p>Potential Energy (PE) = mgh</p>
<p>Kinetic Energy (KE) = 0 (because initial velocity u = 0)</p>
<p>Total Energy = mgh</p>

<p>After falling through height h, just before reaching ground:</p>
<p>Velocity v² = 2gh</p>
<p>Kinetic Energy = ½mv²</p>
<p>KE = ½m(2gh)</p>
<p>KE = mgh</p>
<p>Potential Energy = 0 (at ground)</p>
<p>Total Energy = mgh</p>

<p>Since total energy at top = total energy at bottom,</p>
<p><b>Mechanical Energy remains constant.</b></p>

<p><b>SIMPLE NUMERICAL PROBLEMS</b></p>

<p><b>1) Power Problem:</b></p>
<p>A machine does 1000 J of work in 10 seconds. Find power.</p>
<p>Power = Work / Time</p>
<p>P = 1000 / 10</p>
<p>P = 100 Watt</p>

<p><b>2) Kinetic Energy Problem:</b></p>
<p>Find kinetic energy of a 2 kg body moving with velocity 5 m/s.</p>
<p>KE = ½mv²</p>
<p>KE = ½ × 2 × 5²</p>
<p>KE = 1 × 25</p>
<p>KE = 25 Joule</p>

<p><b>3) Potential Energy Problem:</b></p>
<p>Find potential energy of a 3 kg object at height 10 m (g = 10 m/s²).</p>
<p>PE = mgh</p>
<p>PE = 3 × 10 × 10</p>
<p>PE = 300 Joule</p>
<p><b>PROPERTIES OF MATTER</b></p>

<p>Properties of matter are the characteristics that describe the nature and behavior of a substance.</p>

<p><b>1) Mass:</b></p>
<p>Mass is the amount of matter in a body. SI unit is kilogram (kg).</p>

<p><b>2) Volume:</b></p>
<p>Volume is the space occupied by a body. SI unit is cubic meter (m³).</p>

<p><b>3) Density:</b></p>
<p>Density is mass per unit volume.</p>
<p>Formula: Density = Mass / Volume</p>
<p>SI unit: kg/m³.</p>

<p><b>4) Elasticity:</b></p>
<p>Elasticity is the property by which a body returns to its original shape after removing the force.</p>
<p>Example: Rubber band.</p>

<p><b>5) Plasticity:</b></p>
<p>Plasticity is the property by which a body does not return to its original shape after removing the force.</p>
<p>Example: Clay.</p>

<p><b>6) Inertia:</b></p>
<p>Inertia is the property of a body to resist any change in its state of rest or motion.</p>

<p><b>7) Compressibility:</b></p>
<p>Compressibility is the property of reducing volume under pressure. Gases are highly compressible.</p>

<p><b>8) Rigidity:</b></p>
<p>Rigidity is the property of resisting change in shape. Solids are rigid.</p>

<p><b>9) Surface Tension:</b></p>

<p><b>Definition of Heat (Kinetic Theory):</b></p>
<p>Heat is a form of energy that is transferred from one body to another due to difference in temperature.

<p><b>Definition of Temperature (Kinetic Theory):</b></p>
<p>Temperature is the measure of average kinetic energy of the molecules of a body.</p>

<p><b>Difference Between Heat and Temperature:</b></p>
<p>1) Heat is energy, temperature is the measure of hotness or coldness.</p>
<p>2) Heat depends on mass of substance, temperature does not depend on mass.</p>
<p>3) Heat is measured in Joule (J), temperature is measured in Kelvin (K), °C or °F.</p>

<p><b>Modes of Transfer of Heat:</b></p>

<p>Heat transfer through solids without movement of particles.</p>

<p><b>2) Convection:</b></p>
<p>Heat transfer through liquids and gases by actual movement of particles.</p>

<p>Heat transfer through electromagnetic waves without any medium.</p>
<p>Example: Heat from the Sun.</p>

         <p><b>SEMICONDUCTORS AND DIODES</b></p>

<p><b>Electrons:</b></p>
<p><b>Free Electrons:</b> Electrons that are free to move and conduct electricity.</p>
<p><b>Valence Electrons:</b> Electrons present in the outermost shell of an atom.</p>

<p><b>Conductors, Insulators and Semiconductors:</b></p>

<p><b>Conductors:</b></p>
<p>Materials that allow electric current to pass easily.</p>
<p>Energy bands overlap (no energy gap).</p>
<p>Example: Copper.</p>

<p><b>Insulators:</b></p>
<p>Materials that do not allow current to pass.</p>
<p>Large energy gap between valence and conduction band.</p>
<p>Example: Glass.</p>

<p><b>Semiconductors:</b></p>
<p>Materials with conductivity between conductor and insulator.</p>
<p>Small energy gap.</p>
<p>Example: Silicon, Germanium.</p>

<p><b>Properties of Semiconductors:</b></p>
<p>1) Moderate conductivity.</p>
<p>2) Conductivity increases with temperature.</p>
<p>3) Can be doped to improve conductivity.</p>

<p><b>Hole Current:</b></p>
<p>Current due to movement of holes (absence of electrons).</p>

<p><b>Electron-Hole Pair:</b></p>
<p>When an electron leaves valence band, it creates a hole.</p>

<p><b>Recombination:</b></p>
<p>When a free electron fills a hole.</p>

<p><b>Doping:</b></p>
<p>Adding small amount of impurity to pure semiconductor to increase conductivity.</p>

<p><b>Donor Impurity:</b></p>
<p>Gives extra electrons (Pentavalent atoms like Phosphorus).</p>

<p><b>Acceptor Impurity:</b></p>
<p>Creates holes (Trivalent atoms like Boron).</p>

<p><b>Intrinsic Semiconductor:</b></p>
<p>Pure semiconductor without impurity.</p>

<p><b>Extrinsic Semiconductor:</b></p>
<p>Doped semiconductor with impurities added.</p>

<p><b>N-type Semiconductor:</b></p>
<p>Formed by adding donor impurity. Majority carriers are electrons.</p>

<p><b>P-type Semiconductor:</b></p>
<p>Formed by adding acceptor impurity. Majority carriers are holes.</p>

<p><b>Diode:</b></p>
<p>A diode is a two-terminal semiconductor device that allows current to flow in one direction.</p>

<p><b>Formation of Diode:</b></p>
<p>Formed by joining P-type and N-type semiconductor (PN junction).</p>

<p><b>Depletion Region:</b></p>
<p>Region around PN junction where no free charge carriers exist.</p>

<p><b>VI Characteristics:</b></p>
<p>Forward bias – Current increases after threshold voltage.</p>
<p>Reverse bias – Very small current flows.</p>

<p><b>Diode Ratings:</b></p>
<p>Maximum voltage, current and power handling capacity.</p>

<p><b>Types of Diodes:</b></p>
<p>1) Rectifier diode</p>
<p>2) Zener diode</p>
<p>3) LED</p>
<p>4) Photodiode</p>

<p><b>Applications of Diode:</b></p>
<p>1) Rectification (AC to DC conversion).</p>
<p>2) Signal detection.</p>
<p>3) Protection circuits.</p>

<p><b>Zener Diode:</b></p>
<p>Special diode used for voltage regulation.</p>

<p><b>Reverse Bias Characteristics:</b></p>
<p>At breakdown voltage, current increases sharply but voltage remains constant.</p>

<p><b>Voltage Regulation:</b></p>
<p>Zener diode maintains constant output voltage.</p>

<p><b>Shunt Voltage Regulator:</b></p>
<p>Zener diode connected in parallel with load to regulate voltage.</p>

<p><b>Applications of Zener Diode:</b></p>
<p>1) Voltage stabilizer.</p>
<p>2) Overvoltage protection.</p>

<p><b>Varistor:</b></p>
<p>A voltage dependent resistor. Resistance changes with voltage.</p>
<p><b>Application:</b> Protect circuits from voltage spikes.</p>

<p><b>Thermistor:</b></p>
<p>A temperature dependent resistor. Resistance changes with temperature.</p>
<p><b>Application:</b> Temperature measurement and control.</p>
<p><b>TRANSISTORS AND MOSFETs</b></p>

<p><b>Transistor:</b></p>
<p>A transistor is a three-terminal semiconductor device used for amplification and switching.</p>

<p><b>Terminals:</b></p>
<p>1) Emitter (E)</p>
<p>2) Base (B)</p>
<p>3) Collector (C)</p>

<p><b>Types:</b></p>
<p>1) NPN</p>
<p>2) PNP</p>

<p><b>Formation:</b></p>
<p>NPN: Two N-type layers with one P-type layer in between.</p>
<p>PNP: Two P-type layers with one N-type layer in between.</p>

<p><b>Ratings:</b></p>
<p>Maximum voltage, current and power handling capacity.</p>

<p><b>Transistor Biasing:</b></p>
<p>Biasing means applying proper DC voltage to operate transistor in active region.</p>

<p><b>Importance:</b></p>
<p>1) Proper operation.</p>
<p>2) Avoid distortion.</p>

<p><b>Types of Biasing:</b></p>
<p>1) Fixed bias</p>
<p>2) Collector-to-base bias</p>
<p>3) Voltage divider bias</p>

<p><b>Stabilisation:</b></p>
<p>Maintaining constant operating point despite temperature changes.</p>

<p><b>Thermal Runaway:</b></p>
<p>Increase in temperature increases current, which further increases temperature and may damage transistor.</p>

<p><b>Heat Sink:</b></p>
<p>Metal device used to remove excess heat from transistor.</p>

<p><b>Voltage Divider Method:</b></p>
<p>Most stable biasing method using two resistors to set base voltage.</p>

<p><b>Configurations:</b></p>
<p>1) Common Emitter (CE)</p>
<p>2) Common Base (CB)</p>
<p>3) Common Collector (CC)</p>

<p><b>Applications:</b></p>
<p>Amplifier, switch, oscillator.</p>

<p><b>Alpha (α):</b></p>
<p>Current gain in CB configuration.</p>
<p>α = Ic / Ie</p>

<p><b>Beta (β):</b></p>
<p>Current gain in CE configuration.</p>
<p>β = Ic / Ib</p>

<p><b>Relation:</b></p>
<p>β = α / (1 - α)</p>

<p><b>CE Characteristics:</b></p>
<p>Cut-off region – No conduction.</p>
<p>Active region – Used for amplification.</p>
<p>Saturation region – Fully ON condition.</p>

<p><b>Transistor as a Switch:</b></p>
<p>Operates between cut-off (OFF) and saturation (ON) region.</p>

<p><b>FET (Field Effect Transistor):</b></p>
<p>A voltage-controlled semiconductor device.</p>
<p>Types: JFET and MOSFET.</p>

<p><b>MOSFET:</b></p>
<p>Metal Oxide Semiconductor Field Effect Transistor.</p>

<p><b>Types:</b></p>
<p>1) Enhancement mode</p>
<p>2) Depletion mode</p>

<p><b>N-Type Enhancement MOSFET:</b></p>
<p><b>Construction:</b> Has gate, source, drain and substrate with insulating oxide layer.</p>
<p><b>Working:</b> Conducts only when positive voltage is applied to gate.</p>
<p><b>Characteristics:</b> No current flows at zero gate voltage.</p>
<p><b>Switch:</b> ON when gate voltage applied, OFF when removed.</p>

<p><b>Applications:</b></p>
<p>Switching circuits, amplifiers, power control.</p>

<p><b>Ratings:</b></p>
<p>Maximum drain voltage, current and power.</p>

<p><b>Difference Between BJT and MOSFET:</b></p>
<p>BJT is current controlled device.</p>
<p>MOSFET is voltage controlled device.</p>
<p>BJT has low input impedance.</p>
<p>MOSFET has high input impedance.</p>
<p><b>RECTIFIERS, FILTERS AND REGULATORS</b></p>

<p><b>Regulated Power Supply (RPS):</b></p>
<p>A regulated power supply gives constant DC output voltage.</p>

<p><b>Block Diagram:</b></p>
<p>AC Supply → Transformer → Rectifier → Filter → Voltage Regulator → DC Output</p>

<p><b>Applications:</b></p>
<p>1) Electronic circuits</p>
<p>2) Computers</p>
<p>3) Communication systems</p>

<p><b>Rectifier:</b></p>
<p>A rectifier converts AC (Alternating Current) into DC (Direct Current).</p>

<p><b>Half Wave Rectifier:</b></p>
<p>Uses one diode. Converts only one half cycle of AC into DC.</p>

<p><b>Full Wave Rectifier (Centre Tapped):</b></p>
<p>Uses two diodes and centre tapped transformer. Converts both half cycles.</p>

<p><b>Bridge Rectifier:</b></p>
<p>Uses four diodes. Does not need centre tapped transformer.</p>

<p><b>Efficiency:</b></p>
<p>Half wave efficiency ≈ 40.6%</p>
<p>Full wave efficiency ≈ 81.2%</p>

<p><b>Ripple Factor:</b></p>
<p>Measure of AC component present in DC output.</p>
<p>Lower ripple factor means smoother DC.</p>

<p><b>PIV (Peak Inverse Voltage):</b></p>
<p>Maximum reverse voltage a diode can withstand.</p>

<p><b>Ratings:</b></p>
<p>Maximum current, voltage and power capacity of diode.</p>

<p><b>Filters:</b></p>
<p>A filter removes unwanted AC ripples from rectified output.</p>

<p><b>Necessity:</b></p>
<p>To get smooth DC voltage.</p>

<p><b>C Filter (Capacitor Filter):</b></p>
<p>Uses capacitor to reduce ripple.</p>

<p><b>PI Filter:</b></p>
<p>Combination of capacitor, inductor and capacitor (π shape connection).</p>

<p><b>Regulator:</b></p>
<p>A regulator maintains constant output voltage.</p>

<p><b>7805 Regulator:</b></p>
<p>Gives fixed +5V output.</p>

<p><b>Other Voltage Regulators:</b></p>
<p>7809 → +9V</p>
<p>7812 → +12V</p>
<p>7905 → -5V</p>
<p>7912 → -12V</p>
<p><b>AMPLIFIERS AND OSCILLATORS</b></p>

<p><b>Amplifier:</b></p>
<p>An amplifier is an electronic device that increases the strength of a weak signal.</p>

<p><b>Faithful Amplification:</b></p>
<p>When the output signal is an exact amplified copy of input without distortion.</p>

<p><b>Classification of Amplifiers:</b></p>
<p><b>Based on Configuration:</b> Common Emitter (CE), Common Base (CB), Common Collector (CC).</p>
<p><b>Based on Power:</b> Voltage amplifier, Power amplifier.</p>
<p><b>Based on Frequency:</b> AF (Audio Frequency), RF (Radio Frequency).</p>

<p><b>Transistor CE Amplifier with Biasing:</b></p>
<p>Uses common emitter configuration with proper biasing (usually voltage divider bias). 
Provides high voltage gain.</p>

<p><b>Class A Amplifier:</b></p>
<p>Conducts for full 360° of input cycle. High fidelity, low efficiency.</p>

<p><b>Class B Amplifier:</b></p>
<p>Conducts for 180° of input cycle. Higher efficiency than Class A.</p>

<p><b>Class C Amplifier:</b></p>
<p>Conducts for less than 180°. Used in RF applications.</p>

<p><b>Push-Pull Amplifier:</b></p>
<p>Uses two transistors to amplify both half cycles of signal. Reduces distortion.</p>

<p><b>Two Stage RC Coupled Amplifier:</b></p>
<p>Two CE amplifier stages connected using resistor-capacitor (RC) coupling.</p>
<p>Provides higher gain.</p>

<p><b>Gain in dB:</b></p>
<p>Gain (dB) = 20 log (Vout / Vin)</p>

<p><b>Frequency Response:</b></p>
<p>Shows how gain changes with frequency.</p>
<p>Has three regions: Low, Mid and High frequency.</p>

<p><b>Feedback:</b></p>
<p>Feedback is the process of feeding a part of output back to input.</p>

<p><b>Types:</b></p>
<p>1) Positive Feedback</p>
<p>2) Negative Feedback</p>

<p><b>Advantages:</b></p>
<p>1) Stabilizes gain</p>
<p>2) Reduces distortion</p>

<p><b>Disadvantages:</b></p>
<p>1) May reduce gain</p>
<p>2) Circuit becomes complex</p>

<p><b>Applications:</b></p>
<p>Amplifiers, Oscillators.</p>

<p><b>Oscillator:</b></p>
<p>An oscillator is a circuit that produces continuous AC signal without input signal.</p>

<p><b>Classification:</b></p>
<p>1) RC Oscillator</p>
<p>2) LC Oscillator</p>
<p>3) Crystal Oscillator</p>

<p><b>LC Tank Circuit:</b></p>
<p>Combination of inductor (L) and capacitor (C) used to produce oscillations.</p>

<p><b>Criteria for Oscillation:</b></p>
<p>1) Loop gain = 1</p>
<p>2) Phase shift = 0° or 360°</p>

<p><b>RC Phase Shift Oscillator:</b></p>
<p>Uses RC network to produce phase shift of 180° with amplifier.</p>
<p>Application: Audio frequency generation.</p>

<p><b>Crystal Oscillator:</b></p>
<p>Uses piezoelectric crystal for stable frequency.</p>
<p>Application: Watches, communication systems.</p>

<p><b>CRT (Cathode Ray Tube):</b></p>

<p><b>Construction:</b></p>
<p>Electron gun, deflection plates, fluorescent screen.</p>

<p><b>Working:</b></p>
<p>Electron beam strikes screen and produces visible light.</p>

<p><b>Applications:</b></p>
<p>1) Television</p>
<p>2) Oscilloscope</p>
<p>3) Monitor</p>
<p><b>OP-AMP AND TIMERS</b></p>

<p><b>OP-AMP (Operational Amplifier):</b></p>
<p>An OP-AMP is a high gain voltage amplifier with differential inputs and single output.</p>

<p><b>Block Diagram:</b></p>
<p>1) Differential Amplifier</p>
<p>2) Voltage Amplifier</p>
<p>3) Output Stage</p>

<p><b>Operation:</b></p>
<p>Amplifies the difference between two input voltages.</p>

<p><b>Characteristics:</b></p>
<p>1) High gain</p>
<p>2) High input impedance</p>
<p>3) Low output impedance</p>

<p><b>Applications:</b></p>
<p>Amplifiers, filters, oscillators, comparators.</p>

<p><b>µA741 Pin Diagram (Important Pins):</b></p>
<p>Pin 2 – Inverting input</p>
<p>Pin 3 – Non-inverting input</p>
<p>Pin 6 – Output</p>
<p>Pin 7 – +V supply</p>
<p>Pin 4 – -V supply</p>

<p><b>Virtual Ground:</b></p>
<p>A point in OP-AMP circuit where voltage is nearly zero but not physically connected to ground.</p>

<p><b>CMRR (Common Mode Rejection Ratio):</b></p>
<p>Ability of OP-AMP to reject common signals applied to both inputs.</p>

<p><b>Slew Rate:</b></p>
<p>Maximum rate of change of output voltage per unit time.</p>

<p><b>OP-AMP Applications:</b></p>

<p><b>Inverting Amplifier:</b></p>
<p>Output is 180° out of phase with input.</p>

<p><b>Integrator:</b></p>
<p>Produces output proportional to integral of input.</p>

<p><b>Differentiator:</b></p>
<p>Produces output proportional to derivative of input.</p>

<p><b>Summer (Adder):</b></p>
<p>Adds multiple input signals.</p>

<p><b>Voltage Follower:</b></p>
<p>Output equals input (unity gain).</p>

<p><b>Comparator:</b></p>
<p>Compares two voltages and gives high or low output.</p>

<p><b>Filters:</b></p>
<p>A filter allows certain frequencies and blocks others.</p>

<p><b>Low Pass Filter:</b></p>
<p>Allows low frequencies, blocks high frequencies.</p>

<p><b>High Pass Filter:</b></p>
<p>Allows high frequencies, blocks low frequencies.</p>

<p><b>Passive Filter:</b></p>
<p>Uses resistor and capacitor only.</p>

<p><b>Active Filter:</b></p>
<p>Uses OP-AMP with resistor and capacitor.</p>

<p><b>Applications:</b></p>
<p>Audio systems, communication systems.</p>

<p><b>Timers (555 Timer):</b></p>
<p>555 timer is an integrated circuit used for timing and oscillation.</p>

<p><b>Block Diagram:</b></p>
<p>Contains two comparators, flip-flop, discharge transistor and voltage divider.</p>

<p><b>Pin Diagram (Important Pins):</b></p>
<p>Pin 1 – Ground</p>
<p>Pin 2 – Trigger</p>
<p>Pin 3 – Output</p>
<p>Pin 4 – Reset</p>
<p>Pin 5 – Control voltage</p>
<p>Pin 6 – Threshold</p>
<p>Pin 7 – Discharge</p>
<p>Pin 8 – Vcc</p>

<p><b>Duty Cycle:</b></p>
<p>Percentage of time output remains ON in one cycle.</p>

<p><b>Time Constant:</b></p>
<p>Time constant = R × C</p>

<p><b>Applications:</b></p>
<p>Pulse generation, timers, LED flashing.</p>

<p><b>Multivibrators using 555:</b></p>

<p><b>Astable Mode:</b></p>
<p>Produces continuous square wave without external trigger.</p>

<p><b>Monostable Mode:</b></p>
<p>Produces single pulse for each trigger input.</p>

<p><b>OVERVIEW OF OPERATING SYSTEM</b></p>

<p><b>CPU SCHEDULING AND DEADLOCK</b></p>

<p><b>Shortest Job First (SJF):</b></p>
<p>SJF is a CPU scheduling algorithm in which the process with the shortest burst time is executed first.</p>
<p>Advantage: Minimum average waiting time.</p>
<p>Disadvantage: Starvation of long processes.</p>

<p><b>Round Robin (RR):</b></p>
<p>Round Robin scheduling gives each process a fixed time slice (time quantum) in cyclic order.</p>
<p>Advantage: Fair to all processes.</p>
<p>Disadvantage: Too small time quantum increases overhead.</p>

<p><b>Multiprocessor Scheduling:</b></p>
<p>Used in systems with more than one CPU.</p>
<p>Processes are distributed among multiple processors to improve performance.</p>
<p>Types: Asymmetric multiprocessing and Symmetric multiprocessing.</p>

<p><b>Process Synchronization:</b></p>
<p>Process synchronization ensures that multiple processes access shared resources safely.</p>
<p>Prevents race condition.</p>
<p>Tools: Semaphores, Mutex, Monitors.</p>

<p><b>Deadlock:</b></p>
<p>Deadlock is a situation where two or more processes wait forever for resources held by each other.</p>

<p><b>Conditions for Deadlock (Four Necessary Conditions):</b></p>
<p>1) Mutual Exclusion – Only one process can use a resource at a time.</p>
<p>2) Hold and Wait – Process holds one resource and waits for another.</p>
<p>3) No Preemption – Resources cannot be forcibly taken.</p>
<p>4) Circular Wait – Processes form a circular chain waiting for resources.</p>

<p><b>Methods for Handling Deadlocks:</b></p>
<p>1) Deadlock Prevention</p>
<p>2) Deadlock Avoidance</p>
<p>3) Deadlock Detection and Recovery</p>

<p><b>Deadlock Prevention:</b></p>
<p>Eliminate at least one of the four necessary conditions.</p>

<p><b>Deadlock Avoidance:</b></p>
<p>Allocate resources carefully to avoid unsafe state.</p>
<p>Example: Banker’s Algorithm.</p>

<p><b>Deadlock Detection:</b></p>
<p>Allow deadlock to occur and detect it using algorithms.</p>

<p><b>Recovery from Deadlock:</b></p>
<p>1) Terminate one or more processes.</p>
<p>2) Preempt resources from some processes.</p>
<p><b>MEMORY MANAGEMENT FUNCTION</b></p>

<p><b>Definition:</b></p>
<p>Memory management is the function of an operating system that manages primary memory (RAM) and allocates memory to processes.</p>

<p><b>Logical Address Space:</b></p>
<p>The set of addresses generated by the CPU. It is also called virtual address.</p>

<p><b>Physical Address Space:</b></p>
<p>The actual address in the main memory (RAM).</p>

<p><b>Swapping:</b></p>
<p>Swapping is the process of moving processes between main memory and secondary storage (hard disk).</p>

<p><b>Memory Allocation:</b></p>
<p>Memory allocation means assigning memory space to processes.</p>

<p><b>Contiguous Memory Allocation:</b></p>
<p>In this method, each process is stored in a single continuous block of memory.</p>

<p><b>Fixed Partition:</b></p>
<p>Memory is divided into fixed size partitions.</p>
<p>Simple but may waste memory.</p>

<p><b>Variable Partition:</b></p>
<p>Memory partitions are created according to process size.</p>
<p>Better memory utilization.</p>

<p><b>Internal Fragmentation:</b></p>
<p>Unused memory inside allocated partition.</p>

<p><b>External Fragmentation:</b></p>
<p>Free memory is available but scattered in small blocks.</p>

<p><b>Compaction:</b></p>
<p>Compaction is the process of combining small free memory blocks into one large block.</p>

<p><b>Paging:</b></p>
<p>Paging is a memory management technique that divides memory into fixed size blocks called pages and frames.</p>

<p><b>Principle of Operation:</b></p>
<p>Logical memory is divided into pages and physical memory into frames. Pages are mapped to frames using page table.</p>

<p><b>Page Allocation:</b></p>
<p>Each page of process is allocated to any available frame in memory.</p>

<p><b>Hardware Support for Paging:</b></p>
<p>1) Page Table</p>
<p>2) Translation Lookaside Buffer (TLB)</p>

<p><b>Protection and Sharing:</b></p>
<p>Paging allows protection by controlling access rights and sharing of pages between processes.</p>

<p><b>Disadvantages of Paging:</b></p>
<p>1) Page table overhead.</p>
<p>2) Increased memory access time.</p>

<p><b>Segmentation:</b></p>
<p>Segmentation divides memory into logical segments like code, data and stack.</p>

<p><b>Virtual Memory:</b></p>
<p>Virtual memory allows execution of large programs by using secondary storage as extension of RAM.</p>
<p><b>I/O MANAGEMENT FUNCTIONS AND FILE MANAGEMENT</b></p>

<p><b>I/O Management:</b></p>
<p>I/O (Input/Output) management controls communication between CPU and I/O devices.</p>

<p><b>Dedicated Devices:</b></p>
<p>Devices used by only one process at a time.</p>
<p>Example: Printer (in some systems).</p>

<p><b>Shared Devices:</b></p>
<p>Devices that can be used by multiple processes.</p>
<p>Example: Hard disk.</p>

<p><b>I/O Devices:</b></p>
<p>Devices used for input and output.</p>
<p>Examples: Keyboard, Mouse, Monitor, Printer.</p>

<p><b>Storage Devices:</b></p>
<p>Devices used to store data permanently.</p>
<p>Examples: Hard disk, SSD, Pen drive.</p>

<p><b>Buffering:</b></p>
<p>Buffering is storing data temporarily in memory while transferring between devices.</p>
<p>It improves speed and efficiency.</p>

<p><b>Spooling:</b></p>
<p>Spooling (Simultaneous Peripheral Operations Online) stores data in a queue for processing.</p>
<p>Example: Print queue.</p>

<p><b>FILE MANAGEMENT</b></p>

<p><b>Types of File Systems:</b></p>

<p><b>1) Simple File System:</b></p>
<p>Basic system that manages file storage.</p>

<p><b>2) Basic File System:</b></p>
<p>Handles general file commands like read and write.</p>

<p><b>3) Logical File System:</b></p>
<p>Manages file names, directories and access control.</p>

<p><b>4) Physical File System:</b></p>
<p>Deals with physical storage and disk blocks.</p>

<p><b>Methods of Allocating Disk Space:</b></p>

<p><b>1) Contiguous Allocation:</b></p>
<p>File occupies continuous blocks on disk.</p>
<p>Fast access but causes fragmentation.</p>

<p><b>2) Linked Allocation:</b></p>
<p>File blocks are linked together.</p>
<p>No external fragmentation.</p>

<p><b>3) Indexed Allocation:</b></p>
<p>Uses index block to store addresses of file blocks.</p>
<p>Efficient and flexible.</p>
<p><b>LINUX OPERATING SYSTEM</b></p>

<p><b>History of Unix and Linux:</b></p>
<p>UNIX was developed in 1969 at Bell Labs.  
Linux was created by Linus Torvalds in 1991.  
Linux is based on UNIX principles and is open source.</p>

<p><b>Linux Overview:</b></p>

<p><b>Structure of Linux:</b></p>
<p>1) Kernel – Core part that manages hardware.</p>
<p>2) Shell – Interface between user and kernel.</p>
<p>3) File System – Organizes files and directories.</p>
<p>4) Applications – Programs used by users.</p>

<p><b>Open Linux:</b></p>

<p><b>Linux System Requirements:</b></p>

<p>2) RAM (minimum 1 GB or more).</p>
<p>3) Hard disk space.</p>

<p>mkdir – Create directory.</p>

<p><b>Analog and Digital Signal:</b></p>

<p><b>Number Systems:</b></p>

<p><b>Binary Number System:</b></p>

<p><b>2’s Complement:</b></p>

<p><b>Concept of Code:</b></p>
<p>Code is a system of representing information in digital form.</p>

<p><b>Weighted Codes:</b></p>

<p><b>8421 BCD Code:</b></p>

<p><b>Excess-3 Code:</b></p>

<p><b>Gray Code:</b></p>

<p><b>Concept of Parity:</b></p>
<p>Parity is used to detect errors in data transmission.</p>

<p><b>Single Parity:</b></p>
<p>Add one extra bit to make total number of 1s even or odd.</p>

<p><b>Double Parity:</b></p>
<p>Uses both row and column parity for better error detection.</p>
<p><b>LOGIC GATES AND LOGIC SIMPLIFICATIONS</b></p>

<p><b>Positive and Negative Logic:</b></p>
<p><b>Positive Logic:</b> Higher voltage represents logic 1 and lower voltage represents logic 0.</p>
<p><b>Negative Logic:</b> Higher voltage represents logic 0 and lower voltage represents logic 1.</p>

<p><b>Logic Gates:</b></p>
<p>Logic gates are basic building blocks of digital circuits.</p>

<p><b>NOT Gate:</b></p>
<p>Also called Inverter. It gives opposite output.</p>
<p>Truth Table:</p>
<p>0 → 1</p>
<p>1 → 0</p>

<p><b>AND Gate:</b></p>
<p>Output is 1 only if both inputs are 1.</p>
<p>Truth Table:</p>
<p>0 0 → 0</p>
<p>0 1 → 0</p>
<p>1 0 → 0</p>
<p>1 1 → 1</p>

<p><b>OR Gate:</b></p>
<p>Output is 1 if any one input is 1.</p>

<p><b>NAND Gate:</b></p>
<p>Opposite of AND gate.</p>

<p><b>NOR Gate:</b></p>
<p>Opposite of OR gate.</p>

<p><b>EX-OR (XOR) Gate:</b></p>
<p>Output is 1 when inputs are different.</p>

<p><b>NAND and NOR as Universal Gates:</b></p>
<p>NAND and NOR gates can be used to create any other logic gate.</p>

<p><b>TTL and CMOS Logic Families:</b></p>
<p><b>TTL (Transistor-Transistor Logic):</b> Uses bipolar junction transistors. Fast but consumes more power.</p>
<p><b>CMOS (Complementary MOS):</b> Uses MOSFETs. Low power consumption.</p>

<p><b>Boolean Algebra Postulates:</b></p>
<p>1) A + 0 = A</p>
<p>2) A · 1 = A</p>
<p>3) A + A = A</p>
<p>4) A · A = A</p>
<p>5) A + A’ = 1</p>
<p>6) A · A’ = 0</p>

<p><b>De Morgan’s Theorems:</b></p>
<p>1) (A · B)’ = A’ + B’</p>
<p>2) (A + B)’ = A’ · B’</p>

<p><b>Karnaugh Map (K-Map):</b></p>
<p>K-Map is a graphical method used to simplify Boolean expressions.</p>
<p>It is used for up to 4 variables.</p>
<p>Steps:</p>
<p>1) Draw K-Map grid.</p>
<p>2) Fill values from truth table.</p>
<p>3) Group adjacent 1s in pairs, quads etc.</p>
<p>4) Write simplified expression.</p>

<p><b>Application:</b></p>
<p>K-Map helps in designing simple combinational logic circuits with minimum gates.</p>
<p><b>COMBINATIONAL CIRCUITS</b></p>

<p><b>Half Adder:</b></p>
<p>A half adder adds two binary bits and gives Sum and Carry.</p>
<p>Inputs: A, B</p>
<p>Outputs: Sum (S), Carry (C)</p>
<p>Sum = A ⊕ B</p>
<p>Carry = A · B</p>
<p>Implemented using XOR gate (for Sum) and AND gate (for Carry).</p>

<p><b>Full Adder:</b></p>
<p>A full adder adds three binary bits (A, B and Carry-in).</p>
<p>Inputs: A, B, Cin</p>
<p>Outputs: Sum (S), Carry (Cout)</p>
<p>Sum = A ⊕ B ⊕ Cin</p>
<p>Carry = AB + BCin + ACin</p>
<p>It can be designed using two half adders and one OR gate.</p>

<p><b>4-Bit Adder:</b></p>
<p>A 4-bit adder adds two 4-bit binary numbers.</p>
<p>It is formed by connecting four full adders in series (ripple carry adder).</p>
<p>Carry output of one stage is connected to next stage.</p>

<p><b>4-Bit Decoder for 7-Segment Display:</b></p>
<p>A decoder converts binary input into corresponding output signals.</p>
<p>4-bit BCD input is converted to 7 outputs (a, b, c, d, e, f, g) for display.</p>
<p>Common ICs: 7447 (for common anode), 7448.</p>

<p><b>Multiplexer (MUX):</b></p>
<p>A MUX selects one input from many inputs and sends it to output.</p>
<p>Block diagram includes multiple inputs, select lines and one output.</p>
<p>Common ICs: 74150, 74151.</p>

<p><b>Demultiplexer (DEMUX):</b></p>
<p>A DEMUX sends one input to one of many outputs based on select lines.</p>
<p>Common ICs: 74138, 74139.</p>

<p><b>Encoder:</b></p>
<p>An encoder converts multiple input lines into a smaller number of output lines.</p>
<p>Example: 8-to-3 encoder (8 inputs, 3 outputs).</p>
<p>It reduces number of data lines.</p>
<p><b>SEQUENTIAL CIRCUITS</b></p>

<p><b>Sequential Circuit:</b></p>
<p>A sequential circuit is a digital circuit whose output depends on present input and previous output (memory).</p>

<p><b>Latches:</b></p>
<p>A latch is a basic memory device.</p>

<p><b>Types of Latch:</b></p>

<p><b>1) SR Latch:</b></p>
<p>Inputs: S (Set), R (Reset)</p>
<p>Output: Q</p>
<p>S=1, R=0 → Q=1 (Set)</p>
<p>S=0, R=1 → Q=0 (Reset)</p>
<p>S=0, R=0 → No change</p>
<p>S=1, R=1 → Invalid</p>

<p><b>2) D Latch:</b></p>
<p>Has one input D and Enable.</p>
<p>Q follows D when enable is active.</p>

<p><b>Applications of Latch:</b></p>
<p>Temporary data storage, registers.</p>

<p><b>Flip-Flops:</b></p>
<p>A flip-flop is a clock-controlled memory device.</p>

<p><b>RS Flip-Flop:</b></p>
<p>Works similar to SR latch but controlled by clock.</p>

<p><b>T Flip-Flop:</b></p>
<p>T=1 → Output toggles.</p>
<p>T=0 → No change.</p>

<p><b>D Flip-Flop:</b></p>
<p>Output Q equals input D at clock pulse.</p>

<p><b>JK Flip-Flop:</b></p>
<p>Improved version of RS flip-flop.</p>
<p>J=1, K=0 → Set</p>
<p>J=0, K=1 → Reset</p>
<p>J=1, K=1 → Toggle</p>

<p><b>Master-Slave JK Flip-Flop:</b></p>
<p>Uses two JK flip-flops to remove race condition.</p>

<p><b>Difference Between Latch and Flip-Flop:</b></p>
<p>Latch is level triggered.</p>
<p>Flip-flop is edge triggered (clock controlled).</p>

<p><b>Counters:</b></p>
<p>Counters are sequential circuits that count pulses.</p>

<p><b>Asynchronous Counter:</b></p>
<p>Flip-flops are not triggered simultaneously (ripple counter).</p>

<p><b>Synchronous Counter:</b></p>
<p>All flip-flops are triggered at same time by common clock.</p>

<p><b>Binary Counter:</b></p>
<p>Counts in binary sequence (0,1,2,3...).</p>

<p><b>Divide by N Ripple Counter:</b></p>
<p>Divides input frequency by N.</p>

<p><b>Decade Counter:</b></p>
<p>Counts from 0 to 9 (Mod-10 counter).</p>

<p><b>Ring Counter:</b></p>
<p>Shift register with output of last flip-flop connected to first.</p>

<p><b>Shift Registers:</b></p>
<p>Registers used to store and shift data.</p>

<p><b>Shift Left:</b></p>
<p>Data moves one bit to left.</p>

<p><b>Shift Right:</b></p>
<p>Data moves one bit to right.</p>

<p><b>Types of Shift Registers:</b></p>
<p>1) Serial In Serial Out (SISO)</p>
<p>2) Serial In Parallel Out (SIPO)</p>
<p>3) Parallel In Serial Out (PISO)</p>
<p>4) Parallel In Parallel Out (PIPO)</p>

<p><b>Universal Shift Register:</b></p>
<p>A shift register that can shift left, shift right and load data in parallel.</p>
<p><b>CONVERTERS AND MEMORIES</b></p>

<p><b>A/D Converter (Analog to Digital Converter):</b></p>
<p>An A/D converter converts analog signal into digital form.</p>

<p><b>Working Principle:</b></p>
<p>It samples the analog input and converts it into binary number.</p>

<p><b>Techniques of A/D Conversion:</b></p>

<p><b>a) Stair Step (Ramp) A/D Converter:</b></p>
<p>Uses a counter and DAC to generate step voltage.</p>
<p>Compares input with ramp voltage until equal.</p>

<p><b>b) Dual Slope A/D Converter:</b></p>
<p>Input voltage is integrated for fixed time.</p>
<p>Then reference voltage is applied in opposite direction.</p>
<p>Time taken to return to zero is measured.</p>
<p>High accuracy and noise rejection.</p>

<p><b>c) Successive Approximation A/D Converter:</b></p>
<p>Uses comparator and control logic.</p>
<p>Starts with MSB and checks bit by bit.</p>
<p>Fast and widely used.</p>

<p><b>D/A Converter (Digital to Analog Converter):</b></p>
<p>Converts digital signal into analog voltage.</p>

<p><b>a) Binary Weighted D/A Converter:</b></p>
<p>Uses resistors weighted in powers of 2.</p>
<p>Simple design but needs precise resistor values.</p>

<p><b>b) R/2R Ladder D/A Converter:</b></p>
<p>Uses only two resistor values (R and 2R).</p>
<p>Easy to design and more accurate.</p>

<p><b>Applications of A/D and D/A Converters:</b></p>
<p>1) Digital instruments.</p>
<p>2) Audio and video systems.</p>
<p>3) Communication systems.</p>
<p>4) Microprocessor systems.</p>

<p><b>Memory Organization:</b></p>
<p>Memory is organized as rows and columns of storage cells.</p>
<p>Address lines select location and data lines carry data.</p>

<p><b>Classification of Semiconductor Memories:</b></p>

<p><b>RAM (Random Access Memory):</b></p>
<p>Volatile memory. Data lost when power off.</p>

<p><b>ROM (Read Only Memory):</b></p>
<p>Non-volatile memory. Stores permanent data.</p>

<p><b>PROM:</b></p>
<p>Programmable once by user.</p>

<p><b>EPROM:</b></p>
<p>Erasable using ultraviolet light.</p>

<p><b>EEPROM:</b></p>
<p>Electrically erasable and reprogrammable.</p>

<p><b>Static RAM (SRAM):</b></p>
<p>Uses flip-flops. Fast and costly.</p>

<p><b>Dynamic RAM (DRAM):</b></p>
<p>Uses capacitors. Slower but cheaper.</p>

<p><b>74181 ALU IC:</b></p>
<p>74181 is a 4-bit Arithmetic Logic Unit IC.</p>
<p>It performs arithmetic and logical operations like addition, subtraction, AND, OR.</p>

        <p><b>INTRODUCTION TO DATABASE SYSTEM CONCEPTS AND ARCHITECTURE</b></p>

<p><b>Database System:</b></p>
<p>A database system is a collection of related data and programs used to access and manage that data.</p>

<p><b>Database:</b></p>
<p>A database is an organized collection of data stored electronically.</p>

<p><b>Purpose of Database:</b></p>
<p>To store, manage and retrieve data efficiently.</p>

<p><b>Characteristics of Database Approach:</b></p>
<p>1) Self-describing nature (stores data and metadata).</p>
<p>2) Data independence.</p>
<p>3) Reduced data redundancy.</p>
<p>4) Data sharing and multi-user access.</p>

<p><b>Advantages of DBMS:</b></p>
<p>1) Reduces data duplication.</p>
<p>2) Improves data security.</p>
<p>3) Easy data access.</p>
<p>4) Data consistency.</p>

<p><b>Disadvantages of DBMS:</b></p>
<p>1) High cost.</p>
<p>2) Complexity.</p>
<p>3) Requires trained staff.</p>

<p><b>Classification of DBMS Users:</b></p>

<p><b>Actors on the Scene:</b></p>

<p><b>Database Administrator (DBA):</b></p>
<p>Manages database security, backup and performance.</p>

<p><b>Database Designers:</b></p>
<p>Design database structure and schema.</p>

<p><b>End Users:</b></p>
<p>Use database for queries and reports.</p>

<p><b>System Analysts and Application Programmers:</b></p>
<p>Develop applications that use database.</p>

<p><b>Workers Behind the Scene:</b></p>
<p>1) DBMS Designers and Implementers.</p>
<p>2) Tool Developers.</p>
<p>3) Operators and Maintenance Personnel.</p>

<p><b>Data Models:</b></p>
<p>Conceptual tools used to describe structure of database (Example: Relational model).</p>

<p><b>Schema:</b></p>
<p>Overall design of database.</p>

<p><b>Instance:</b></p>
<p>Actual data stored in database at a particular time.</p>

<p><b>Database State:</b></p>
<p>Current data stored in database.</p>

<p><b>DBMS Architecture:</b></p>

<p><b>External Level:</b></p>
<p>User view of database.</p>

<p><b>Conceptual Level:</b></p>
<p>Logical structure of entire database.</p>

<p><b>Internal Level:</b></p>
<p>Physical storage of data.</p>

<p><b>Mappings:</b></p>
<p>Link between different levels of architecture.</p>

<p><b>Data Independence:</b></p>

<p><b>Logical Data Independence:</b></p>
<p>Ability to change conceptual schema without changing external schema.</p>

<p><b>Physical Data Independence:</b></p>
<p>Ability to change internal schema without affecting conceptual schema.</p>

<p><b>Database Languages:</b></p>
<p>DDL (Data Definition Language)</p>
<p>DML (Data Manipulation Language)</p>
<p>DCL (Data Control Language)</p>

<p><b>DBMS Interfaces:</b></p>
<p>1) Command Line Interface</p>
<p>2) Graphical User Interface</p>
<p>3) Application programs</p>

<p><b>Classification of DBMS:</b></p>

<p><b>Centralized DBMS:</b></p>
<p>Database stored at single location.</p>

<p><b>Distributed DBMS:</b></p>
<p>Database stored at multiple locations connected through network.</p>
<p><b>DATA MODELING USING E/R MODEL AND RELATIONAL DATA MODEL</b></p>

<p><b>Classification of Data Models:</b></p>
<p><b>1) File Based (Primitive) Model:</b> Data stored in files without proper structure.</p>
<p><b>2) Traditional Data Models:</b> Hierarchical and Network models.</p>
<p><b>3) Semantic Data Models:</b> E/R model which shows meaning of data.</p>

<p><b>E/R (Entity Relationship) Model:</b></p>
<p>A high-level data model used to design database.</p>

<p><b>Entity:</b></p>
<p>An object or thing about which data is stored. Example: Student, Employee.</p>

<p><b>Attributes:</b></p>
<p>Properties of entity. Example: Roll No, Name, Age.</p>

<p><b>Entity Type:</b></p>
<p>Group of similar entities.</p>

<p><b>Entity Set:</b></p>
<p>Collection of all entities of same type.</p>

<p><b>Key Attribute:</b></p>
<p>Attribute that uniquely identifies an entity.</p>

<p><b>Domain of Attribute:</b></p>
<p>Set of possible values an attribute can have.</p>

<p><b>Relationship:</b></p>
<p>Association among entities. Example: Student "enrolls" in Course.</p>

<p><b>Database Design with E/R Model:</b></p>
<p>1) Identify entities.</p>
<p>2) Identify attributes.</p>
<p>3) Define relationships.</p>
<p>4) Draw E/R diagram.</p>

<p><b>Relational Model Concepts:</b></p>

<p><b>Domain:</b></p>
<p>Set of valid values for an attribute.</p>

<p><b>Attribute:</b></p>
<p>Column in a table.</p>

<p><b>Tuple:</b></p>
<p>Row in a table.</p>

<p><b>Cardinality:</b></p>
<p>Number of tuples in a relation.</p>

<p><b>Relation:</b></p>
<p>A table with rows and columns.</p>

<p><b>Keys:</b></p>
<p><b>Primary Key:</b> Uniquely identifies each record.</p>
<p><b>Secondary Key:</b> Non-unique attribute used for searching.</p>
<p><b>Foreign Key:</b> Attribute that refers to primary key of another table.</p>
<p><b>Alternate Key:</b> Candidate key not selected as primary key.</p>

<p><b>Relational Constraints:</b></p>

<p><b>Domain Constraint:</b> Attribute values must be from defined domain.</p>
<p><b>Key Constraint:</b> No two tuples can have same primary key.</p>
<p><b>Null Constraint:</b> Certain attributes cannot have NULL value.</p>

<p><b>Relational Database Schema:</b></p>
<p>Structure of database with table definitions.</p>

<p><b>Entity Integrity:</b></p>
<p>Primary key cannot be NULL.</p>

<p><b>Referential Integrity:</b></p>
<p>Foreign key must match primary key in referenced table.</p>

<p><b>Comparison between E/R Model and Relational Model:</b></p>
<p>E/R Model – Used for database design (conceptual level).</p>
<p>Relational Model – Used for implementation (tables).</p>
<p>E/R uses diagrams.</p>
<p>Relational model uses tables.</p>
<p><b>NORMALIZATION</b></p>

<p><b>Normalization:</b></p>
<p>Normalization is the process of organizing data in a database to reduce redundancy and improve data integrity.</p>

<p><b>Functional Dependency (FD):</b></p>
<p>A functional dependency means one attribute depends on another attribute.</p>
<p>Example: Roll_No → Name (Roll number determines name).</p>

<p><b>Trivial Functional Dependency:</b></p>
<p>A dependency where right side attribute is already part of left side.</p>
<p>Example: (A, B) → A</p>

<p><b>Non-Trivial Functional Dependency:</b></p>
<p>A dependency where right side attribute is not part of left side.</p>
<p>Example: A → B</p>

<p><b>Non-Loss (Lossless) Decomposition:</b></p>
<p>When a table is divided into smaller tables without losing data.</p>
<p>After joining decomposed tables, original table is obtained.</p>

<p><b>First Normal Form (1NF):</b></p>
<p>1) Table should have atomic (single) values.</p>
<p>2) No repeating groups.</p>

<p><b>Second Normal Form (2NF):</b></p>
<p>1) Must be in 1NF.</p>
<p>2) No partial dependency (non-key attribute should depend on full primary key).</p>

<p><b>Third Normal Form (3NF):</b></p>
<p>1) Must be in 2NF.</p>
<p>2) No transitive dependency (non-key attribute should not depend on another non-key attribute).</p>

<p><b>Boyce-Codd Normal Form (BCNF):</b></p>
<p>A stronger version of 3NF.</p>
<p>Every determinant must be a candidate key.</p>

<p><b>Denormalization:</b></p>
<p>Process of combining tables to improve performance.</p>
<p>Used when faster data retrieval is required.</p>
<p><b>DATABASE ACCESS AND SECURITY</b></p>

<p><b>Indexes:</b></p>
<p>An index is used to speed up searching of data in a table.</p>

<p><b>Creating an Index:</b></p>
<p>CREATE INDEX index_name ON table_name(column_name);</p>

<p><b>Using an Index:</b></p>
<p>Indexes are automatically used by DBMS to search data faster.</p>

<p><b>Views:</b></p>
<p>A view is a virtual table based on a query.</p>
<p>It does not store data physically.</p>

<p><b>Creating a View:</b></p>
<p>CREATE VIEW view_name AS SELECT column1, column2 FROM table_name;</p>

<p><b>Using a View:</b></p>
<p>SELECT * FROM view_name;</p>

<p><b>Database Security:</b></p>
<p>Database security protects data from unauthorized access.</p>

<p><b>Process Controls:</b></p>
<p>Rules and procedures to control access and usage of database.</p>

<p><b>Database Protection:</b></p>
<p>1) User authentication.</p>
<p>2) Access control.</p>
<p>3) Backup and recovery.</p>

<p><b>GRANT Command:</b></p>
<p>Used to give permissions to users.</p>
<p>Example: GRANT SELECT ON table_name TO user_name;</p>

<p><b>REVOKE Command:</b></p>
<p>Used to remove permissions from users.</p>
<p>Example: REVOKE SELECT ON table_name FROM user_name;</p>
<p><b>MYSQL / SQL (STRUCTURED QUERY LANGUAGE)</b></p>

<p><b>SQL:</b></p>
<p>SQL is a language used to manage and manipulate databases.</p>

<p><b>DDL (Data Definition Language):</b></p>
<p>Used to define and modify database structure.</p>

<p><b>Creating Table:</b></p>
<p>CREATE TABLE student (id INT, name VARCHAR(20), marks INT);</p>

<p><b>Creating Table from Another Table:</b></p>
<p>CREATE TABLE new_table AS SELECT * FROM student;</p>

<p><b>Inserting Values:</b></p>
<p>INSERT INTO student VALUES (1, 'Rahul', 85);</p>

<p><b>Updating Table:</b></p>
<p>UPDATE student SET marks = 90 WHERE id = 1;</p>

<p><b>Deleting Rows:</b></p>
<p>DELETE FROM student WHERE id = 1;</p>

<p><b>Dropping Table:</b></p>
<p>DROP TABLE student;</p>

<p><b>DML (Data Manipulation Language):</b></p>
<p>Used to retrieve and manipulate data.</p>

<p><b>Database Security and Privileges:</b></p>
<p>Controls user access to database.</p>

<p><b>Grant Command:</b></p>
<p>GRANT SELECT, INSERT ON student TO user1;</p>

<p><b>Revoke Command:</b></p>
<p>REVOKE INSERT ON student FROM user1;</p>

<p><b>Maintaining Database Objects:</b></p>
<p>Using ALTER, DROP, RENAME commands.</p>

<p><b>Commit:</b></p>
<p>Saves changes permanently.</p>

<p><b>Rollback:</b></p>
<p>Cancels changes before commit.</p>

<p><b>Select Commands:</b></p>
<p>SELECT * FROM student;</p>
<p>SELECT name FROM student WHERE marks > 80;</p>

<p><b>Types of Joins:</b></p>
<p>1) INNER JOIN</p>
<p>2) LEFT JOIN</p>
<p>3) RIGHT JOIN</p>
<p>4) FULL JOIN</p>

<p><b>Sub Query:</b></p>
<p>A query inside another query.</p>

<p><b>Aggregate Functions:</b></p>
<p>COUNT(), SUM(), AVG(), MAX(), MIN()</p>

<p><b>Challenges of MySQL:</b></p>
<p>1) Handling very large data.</p>
<p>2) Security risks if not configured properly.</p>
<p>3) Performance issues with complex queries.</p>

<p><b>Introduction to Big Data:</b></p>
<p>Big Data refers to very large and complex data sets.</p>

<p><b>Characteristics of Big Data (5V):</b></p>
<p>1) Volume – Large amount of data.</p>
<p>2) Velocity – Speed of data generation.</p>
<p>3) Variety – Different types of data.</p>
<p>4) Veracity – Data accuracy.</p>
<p>5) Value – Useful information from data.</p>

<p><b>Examples of Big Data:</b></p>
<p>1) Social media data.</p>
<p>2) Online shopping records.</p>
<p>3) Sensor data.</p>
<p>4) Banking transactions.</p>

    `;
}

if(subject === "coa"){

        <p><b>CPU ORGANISATION</b></p>

<p><b>General Register Organisation:</b></p>
<p>CPU contains general purpose registers to store data temporarily.</p>
<p>Registers are connected through a common bus.</p>

<p><b>Stack Organisation:</b></p>
<p>Stack is a memory structure that follows LIFO (Last In First Out).</p>
<p>Used for function calls and temporary storage.</p>

<p><b>Instruction Formats:</b></p>
<p><b>Three Address:</b> ADD A, B, C (A = B + C)</p>
<p><b>Two Address:</b> ADD A, B (A = A + B)</p>
<p><b>One Address:</b> Uses accumulator (ADD B)</p>
<p><b>Zero Address:</b> Used in stack (no explicit address)</p>
<p><b>RISC Instruction:</b> Simple and fixed length instructions.</p>

<p><b>Addressing Modes:</b></p>
<p>Immediate – Operand is given in instruction.</p>
<p>Register – Operand in register.</p>
<p>Direct – Address of operand given directly.</p>
<p>Indirect – Address stored in another location.</p>
<p>Relative – Address relative to program counter.</p>
<p>Indexed – Base address + index value.</p>

<p><b>MEMORY ORGANISATION</b></p>

<p><b>Memory Hierarchy:</b></p>
<p>Registers → Cache → Main Memory → Secondary Memory.</p>

<p><b>RAM and ROM Chips:</b></p>
<p>RAM – Volatile memory.</p>
<p>ROM – Non-volatile memory.</p>

<p><b>Memory Address Map:</b></p>
<p>Shows allocation of memory addresses.</p>

<p><b>Memory Connection to CPU:</b></p>
<p>Through address bus, data bus and control bus.</p>

<p><b>Auxiliary Memory:</b></p>
<p>Magnetic Disk – Stores large data permanently.</p>
<p>Magnetic Tape – Used for backup.</p>

<p><b>Associative Memory:</b></p>
<p>Accessed by content rather than address.</p>

<p><b>Cache Memory:</b></p>
<p>Small fast memory between CPU and RAM.</p>

<p><b>Virtual Memory:</b></p>
<p>Uses disk space as extension of RAM.</p>

<p><b>Memory Management Hardware:</b></p>
<p>Includes MMU (Memory Management Unit).</p>

<p><b>Read and Write Operation:</b></p>
<p>Read – Data transfer from memory to CPU.</p>
<p>Write – Data transfer from CPU to memory.</p>

<p><b>I/O ORGANISATION</b></p>

<p><b>BIOS (Basic Input Output System):</b></p>
<p>Firmware stored in ROM.</p>
<p>Functions:</p>
<p>1) System testing (POST).</p>
<p>2) Hardware initialization.</p>
<p>3) Load operating system.</p>

<p><b>Modes of Data Transfer:</b></p>
<p>Programmed I/O</p>
<p>Interrupt initiated I/O</p>
<p>DMA (Direct Memory Access)</p>

<p><b>Programmed I/O:</b></p>
<p>CPU controls data transfer.</p>

<p><b>Synchronous:</b> Data transfer with clock signal.</p>
<p><b>Asynchronous:</b> No common clock.</p>

<p><b>Interrupt Initiated:</b></p>
<p>Device sends interrupt signal to CPU.</p>

<p><b>DMA:</b></p>
<p>Data transferred directly between memory and device without CPU.</p>

<p><b>ARCHITECTURE OF MULTIPROCESSOR SYSTEMS</b></p>

<p><b>Parallel Processing:</b></p>
<p>Multiple processors work simultaneously.</p>

<p><b>Pipelining:</b></p>
<p>Execution of multiple instruction stages in parallel.</p>

<p><b>Characteristics:</b></p>
<p>High speed, shared memory, multiple CPUs.</p>

<p><b>General Purpose Multiprocessors:</b></p>
<p>Used for common computing tasks.</p>

<p><b>Interconnection Networks:</b></p>
<p>Time Shared Common Bus</p>
<p>Multi-port Memory</p>
<p>Crossbar Switch</p>
<p>Multistage Switching Network</p>

<p><b>I/O INTERFACE</b></p>

if(subject === "se"){
    subjectTitle.innerText = "Software Engineering";
    notesContent.innerHTML = `
        <p>SDLC, Agile Model, Requirement Analysis, Testing, Project Management.</p>
    `;
}

if(subject === "elective2"){
    subjectTitle.innerText = "Programme Elective - II";

        <p>Subject depends on selected elective course.</p>
    `;
}


}







function toggleSubjects(){

    const panel = document.getElementById("subjectPanel");
    const btn = document.getElementById("toggleBtn");

    panel.classList.toggle("collapsed");

    if(panel.classList.contains("collapsed")){
        btn.innerText = "Expand Panel";
    } else {
        btn.innerText = "Collapse Panel";
    }
}
