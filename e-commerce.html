<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Notes Manager</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    .container {
        max-width: 1100px;
        margin: auto;
    }

    .add-branch {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .add-branch input {
        flex: 1;
    }

    input {
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button {
        padding: 10px 15px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        background: #f8f9fc;
        color: #333;
        transition: 0.3s;
    }

    button:hover {
        background: #d1d3e2;
    }

    .branches-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
    }

    .branch {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
    }

    .branch h3 {
        margin-bottom: 10px;
        color: #4e73df;
    }

    .note-input {
        display: flex;
        gap: 5px;
        margin-bottom: 10px;
    }

    .note {
        background: #f8f9fc;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        word-break: break-word;
    }

    .delete-btn {
        background: #e74a3b;
        color: white;
        font-size: 12px;
        padding: 5px 8px;
    }

    .delete-btn:hover {
        background: #c0392b;
    }

    /* 📱 Mobile Adjustments */
    @media (max-width: 600px) {
        .add-branch {
            flex-direction: column;
        }

        .note-input {
            flex-direction: column;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>

<body>

<h1>📚 Branch Notes Manager</h1>

<div class="container">

    <div class="add-branch">
        <input type="text" id="branchName" placeholder="Enter Branch Name">
        <button onclick="addBranch()">Add Branch</button>
    </div>

    <div id="branches" class="branches-grid"></div>

</div>

<script>
let branches = JSON.parse(localStorage.getItem("branches")) || [];

function saveData() {
    localStorage.setItem("branches", JSON.stringify(branches));
}

function addBranch() {
    const branchName = document.getElementById("branchName").value.trim();
    if (branchName === "") return alert("Enter branch name!");

    branches.push({ name: branchName, notes: [] });
    document.getElementById("branchName").value = "";
    saveData();
    displayBranches();
}

function addNote(index) {
    const noteInput = document.getElementById("noteInput" + index);
    const noteText = noteInput.value.trim();
    if (noteText === "") return alert("Enter note!");

    branches[index].notes.push(noteText);
    noteInput.value = "";
    saveData();
    displayBranches();
}

function deleteNote(branchIndex, noteIndex) {
    branches[branchIndex].notes.splice(noteIndex, 1);
    saveData();
    displayBranches();
}

function displayBranches() {
    const container = document.getElementById("branches");
    container.innerHTML = "";

    branches.forEach((branch, index) => {
        const branchDiv = document.createElement("div");
        branchDiv.className = "branch";

        branchDiv.innerHTML = `
            <h3>${branch.name}</h3>
            <div class="note-input">
                <input type="text" id="noteInput${index}" placeholder="Write a note">
                <button onclick="addNote(${index})">Add</button>
            </div>
            ${branch.notes.map((note, noteIndex) => `
                <div class="note">
                    <span>${note}</span>
                    <button class="delete-btn" onclick="deleteNote(${index}, ${noteIndex})">X</button>
                </div>
            `).join("")}
        `;

        container.appendChild(branchDiv);
    });
}

displayBranches();
</script>

</body>
</html>
